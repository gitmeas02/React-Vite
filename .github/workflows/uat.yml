name: frontend-react-vite-uat

on:
  push:
    branches: [uat]
  pull_request:
    branches: [uat]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      DEPLOY_URL: ${{ vars.DEPLOY_URL }}
      API_KEY_UAT: ${{ secrets.API_KEY_UAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Show deployment target
        run: echo "Deploying to $DEPLOY_URL"