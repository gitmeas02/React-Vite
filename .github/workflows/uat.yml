name: frontend-react-vite-uat

on:
  push:
    branches: [uat]
  pull_request:
    branches: [uat]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Which branch to deploy'
        required: true
        default: 'uat'
        type: choice
        options:
          - develop
          - development
          - uat
      environment:
        description: 'Target environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - develop
          - development
          - uat

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'uat' }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      DEPLOY_URL: ${{ vars.DEPLOY_URL }}
      API_KEY_UAT: ${{ secrets.API_KEY_UAT }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'uat' }}

    steps:
      - name: Checkout selected branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Checkout event branch
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Show deployment target
        run: echo "Deploying branch $TARGET_BRANCH to $TARGET_ENVIRONMENT at $DEPLOY_URL"